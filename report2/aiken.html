
<html>
  <head>
    <meta charset="utf-8" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/110/three.min.js"></script>
    <script src="OrbitControls.js"></script>
    <script>
      // ページの読み込みを待つ
      window.addEventListener('load', init);

      function init() {
        // サイズを指定
        const width = 960;
        const height = 540;

        // レンダラーを作成
        const renderer = new THREE.WebGLRenderer({
          canvas: document.querySelector('#myCanvas')
        });
        renderer.setSize(width, height);

        // シーンを作成
        const scene = new THREE.Scene();

        // カメラを作成
        const camera = new THREE.PerspectiveCamera(45, width / height);
        // カメラの初期座標を設定
        camera.position.set(0, 0, 200);

        // カメラコントローラーを作成
        const controls = new THREE.OrbitControls(camera,document.body);
  
        // 平行光源1
        var directionalLight1 = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight1.position.set(100, 100, 100);
        // シーンに追加
        scene.add(directionalLight1);
        // 平行光源2
        var directionalLight2 = new THREE.DirectionalLight(0xffffff, 2);
        directionalLight2.position.set(-100, 100, 100);
        // シーンに追加
        scene.add(directionalLight2);
        
        // 平行光源3
        var directionalLight3 = new THREE.DirectionalLight(0xffffff, 5);
        directionalLight3.position.set(100, 100, -100);
        // シーンに追加
        scene.add(directionalLight3);        

        // 頭を作成
        var geometry = new THREE.BoxGeometry(30, 12, 20);
        var material = new THREE.MeshPhongMaterial({ color: 0x0000ff });
        var box1 = new THREE.Mesh(geometry, material);
        box1.position.set(0.3, 0, -5)
        scene.add(box1);

        // 頭2を作成
        var geometry = new THREE.BoxGeometry(20, 6, 20);
        var material = new THREE.MeshPhongMaterial({ color: 0x00ff00 });
        var box2 = new THREE.Mesh(geometry, material);
        box2.position.set(-4.7, 10, -5)
        scene.add(box2);
        
        // 鼻を作成
        var geometry = new THREE.BoxGeometry(3, 4, 6);
        var material = new THREE.MeshPhongMaterial({ color: 0xff0000 });
        var box3 = new THREE.Mesh(geometry, material);
        box3.position.set(14, 4, -5)
        scene.add(box3);        

        tick();

        // 毎フレーム時に実行されるループイベントです
        function tick() {
          // レンダリング
          renderer.render(scene, camera);
          requestAnimationFrame(tick);
        }
      }
    </script>
  </head>

  <body>
    <canvas id="myCanvas"></canvas>
  </body>
</html>
