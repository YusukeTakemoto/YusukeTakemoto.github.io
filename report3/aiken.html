<html>
  <head>
    <meta charset="utf-8" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/110/three.min.js"></script>
    <script src="OrbitControls.js"></script>
    <script>
      // ページの読み込みを待つ
      window.addEventListener('load', init);

      function init() {
        // サイズを指定
        const width = 960;
        const height = 540;

        // レンダラーを作成
        const renderer = new THREE.WebGLRenderer({
          canvas: document.querySelector('#myCanvas')
        });
        renderer.setSize(width, height);
        // 背景の色を設定
        renderer.setClearColor(0x1e90ff);

        // シーンを作成
        const scene = new THREE.Scene();

        // カメラを作成
        const camera = new THREE.PerspectiveCamera(45, width / height);
        // カメラの初期座標を設定
        camera.position.set(0, 700, 1000);

        // カメラコントローラーを作成
        const controls = new THREE.OrbitControls(camera,document.body);
  
        // 平行光源1
        var directionalLight1 = new THREE.DirectionalLight(0xffffff);
        directionalLight1.position.set(100, 100, 100);
        // シーンに追加
        scene.add(directionalLight1);
        // 平行光源2
        var directionalLight2 = new THREE.DirectionalLight(0xffffff);
        directionalLight2.position.set(-100, 100, 100);
        // シーンに追加
        scene.add(directionalLight2);

        // 犬をスプライトで作成
        var textureLoader1 = new THREE.TextureLoader();  
        var texture0 = textureLoader1.load("img/aiken.png");
        const material0 = new THREE.SpriteMaterial({ map: texture0,});

        const sprite0 = new THREE.Sprite(material0);
        sprite0.position.x = 0;
        sprite0.position.y = 50;
        sprite0.position.z = 20;
        sprite0.scale.set(70,120,70);
        scene.add(sprite0);

        // テクスチャー読み込み
        var textureLoader2 = new THREE.TextureLoader();  
        var texture = textureLoader2.load("img/gomball.jpg");
        var mat = new THREE.MeshPhongMaterial();
        mat.map = texture;
        
        var bump1 = textureLoader2.load("img/gomball.jpg");
        mat.bumpMap = bump1;
        mat.bumpscale = 0.8;

        // 球を作成
        var geometry = new THREE.SphereGeometry(10, 10, 10 ); ;
        var Sphere = new THREE.Mesh(geometry, mat);
        Sphere.position.set(-50, 9, 70);
        scene.add(Sphere);
	      
        // テクスチャー読み込み
        var textureLoader3 = new THREE.TextureLoader();  
        var texture = textureLoader3.load("img/sofa.jpg");
        var mat2 = new THREE.MeshPhongMaterial();
        mat2.map = texture;
        
        var bump3 = textureLoader3.load("img/sofa.jpg");
        mat2.bumpMap = bump3;
        mat2.bumpscale = 0.8;	      
	      
	var geometry2 = new THREE.BoxGeometry(200, 180, 70); ;
	var Box1 = new THREE.Mesh(geometry2, mat2)
	Box1.position.set(0, 120, -300)
	scene.add(Box1);
	 
        
   // テクスチャー読み込み
   var textureLoader = new THREE.TextureLoader();    


	
	//床を作成
	var textureLoader6 = new THREE.TextureLoader()
        var texture6 = textureLoader6.load("img/yuka2.png");
	var material6 = new THREE.MeshPhongMaterial();
        material6.map = texture6;
	      
	var bump2 = textureLoader6.load("img/yuka2.png");  
	material6.bumpMap = bump2;
	material6.bumpscale = 0.5;
	      
        var planeGeometry = new THREE.PlaneGeometry(500,500);
        var plane = new THREE.Mesh(planeGeometry, material6);
        plane.rotation.set(-Math.PI/2,0,0);
        plane.position.set(0, 0, 0);
        scene.add(plane);	      
        
        tick();
        // 毎フレーム時に実行されるループイベントです
        function tick() {
          // レンダリング
          renderer.render(scene, camera);
          requestAnimationFrame(tick);
        }
      }
    </script>
  </head>

  <body>
    <canvas id="myCanvas"></canvas>
  </body>
</html>
